<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Talking Emoji AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .chat-container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 380px;
            text-align: center;
        }

        #emoji-face {
            font-size: 100px;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.1s ease;
        }

        /* Bouncing speech animation */
        .talking {
            animation: speak 0.15s infinite alternate;
        }

        @keyframes speak {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.08) translateY(-8px); }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #FF9A9E;
        }

        button {
            padding: 12px 20px;
            background-color: #FF6B81;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #FF4757;
        }

        #response-text {
            margin: 15px 0;
            font-size: 16px;
            color: #333;
            min-height: 40px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- The visual emoji face -->
        <div id="emoji-face">🤖</div>
        <div id="response-text">Type 'hello', 'joke', or ask 'how are you'!</div>
        
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Type here...">
            <button onclick="talkToEmoji()">Send</button>

        </div>
    </div>
    <script>
        const emoji = document.getElementById('emoji-face');
        const responseText = document.getElementById('response-text');
        const synth = window.speechSynthesis;

        // Built-in response system (No internet API needed!)
        const brain = {
            "hello": "Hello friend! Nice to meet you.",
            "hi": "Hey there! How is your day going?",
            "how are you": "I am feeling fantastic and fully charged!",
            "joke": "Why don't scientists trust atoms? Because they make up everything!",
            "name": "My name is Emoji AI. I live right inside your code!",
            "bye": "Goodbye! Come talk to me again soon.",
            "crazy" : "Is a bad word!?",
            "bitch" : "Is a bad word!",
            "fuck" : "Is a bad word!",
            "google": "You can search for that on <a href='https://google.com' target='_blank'>Google</a>.",
            "who are you" : "I am an ai!",
            "cute" : "❤️❤️❤️❤️",
            "សួស្ដី" : "សួស្ដីអ្នក!",
            "សួស្តី" : "សួស្ដីអ្នក!",
            "default": "That sounds interesting! Tell me more about it."
        };
        function speakAloud(text) {
            if (synth.speaking) {
                synth.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Animate face when speaking starts
            utterance.onstart = () => {
                emoji.innerText = "😯"; // Open mouth emoji
                emoji.classList.add('talking');
            };

            // Reset face when speaking ends
            utterance.onend = () => {
                emoji.innerText = "🤖"; // Happy normal robot emoji
                emoji.classList.remove('talking');
            };

            synth.speak(utterance);
        }

        function talkToEmoji() {
            const inputField = document.getElementById('user-input');
            const cleanText = inputField.value.trim().toLowerCase();

            if (!cleanText) return;
            inputField.value = '';

            // Set face to thinking mode
            emoji.innerText = "🤔";
            responseText.innerText = "Processing...";

            // Look up response after a tiny delay to simulate thinking
            setTimeout(() => {
                let answer = brain["default"];

                // Search if user's text matches our brain keywords
                for (let key in brain) {
                    if (cleanText.includes(key) && key !== "default") {
                        answer = brain[key];
                        break;
                    }
                }

                // Display response text and speak it aloud
                responseText.innerText = answer;
                speakAloud(answer);
            }, 400);
        }

        // Allow 'Enter' key to activate speech
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                talkToEmoji();
            }
        });
    </script>
</body>
</html>
