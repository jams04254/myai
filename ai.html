<head>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .chat-container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 480px;
            text-align: center;
        }

        #emoji-face {
            font-size: 100px;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.1s ease;
        }

        /* Bouncing speech animation */
        .talking {
            animation: speak 0.15s infinite alternate;
        }

        @keyframes speak {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.08) translateY(-8px); }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #FF9A9E;
        }

        button {
            padding: 12px 20px;
            background-color: #FF6B81;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #FF4757;
        }

        #response-text {
            margin: 15px 0;
            font-size: 16px;
            color: #333;
            min-height: 40px;
            font-weight: 500;
        }
    </style>
</head>

        const emoji = document.getElementById('emoji-face');
        const responseText = document.getElementById('response-text');
        const synth = window.speechSynthesis;

        // Built-in response system (No internet API needed!)
        const brain = {
            "happy" : "Happy is an emotional state characterized by feelings of joy, satisfaction, contentment, and fulfillment.",
            "I am cute" : "Yes you so cute.🥰",
            "I'm cute" : "Yes you so cute.🥰",

      let recognition = null;
let isListening = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  alert("Please switch to Google Chrome or Microsoft Edge!");
} else {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true; // Show words as you say them
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    let interimTranscript = "";
    
    // Loop through results structure correctly
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        document.getElementById("textBox").innerHTML += event.results[i][0].transcript + " ";
      } else {
        interimTranscript += event.results[i][0].transcript;
      }
    }
    console.log("Heard words: ", interimTranscript);
  };

  recognition.onerror = function(event) {
    console.error("Speech error: ", event.error);
    alert("Microphone Error: " + event.error); // This will tell you EXACTLY what's wrong!
  };

  recognition.onend = function() {
    if (isListening) recognition.start(); // Keep alive loop
  };
}

function toggleListening() {
  if (!recognition) return;
  const button = document.getElementById("toggleButton");

  if (isListening) {
    isListening = false;
    recognition.stop();
    button.innerText = "Start Listening";
    button.classList.remove("active");
  } else {
    isListening = true;
    // Clear box for new session
    document.getElementById("user-input").innerText = ""; 
    recognition.start();
    button.innerText = "Stop Listening";
    button.classList.add("active");
  }
}
        function speakAloud(text) {
            if (synth.speaking) {
                synth.cancel();
            }

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Animate face when speaking starts
            utterance.onstart = () => {
                emoji.innerText = "😯"; // Open mouth emoji
                emoji.classList.add('talking');
            };

            // Reset face when speaking ends
            utterance.onend = () => {
                emoji.innerText = "😊"; // Happy normal robot emoji
                emoji.classList.remove('talking');
            };

            synth.speak(utterance);
        }

        function talkToEmoji() {
            const inputField = document.getElementById('user-input');
            const cleanText = inputField.value.trim().toLowerCase();

            if (!cleanText) return;
            inputField.value = '';

            // Set face to thinking mode
            emoji.innerText = "🤔";
            responseText.innerText = "Processing...";

            // Look up response after a tiny delay to simulate thinking
            setTimeout(() => {
                let answer = brain["default"];

                // Search if user's text matches our brain keywords
                for (let key in brain) {
                    if (cleanText.includes(key) && key !== "default") {
                        answer = brain[key];
                        break;
                    }
                }

                // Display response text and speak it aloud
                responseText.innerHTML = answer;
                speakAloud(answer);
            }, 400);
        }
        // Allow 'Enter' key to activate speech
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                talkToEmoji();
            }
        });

    </script>
